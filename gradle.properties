org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
android.suppressUnsupportedCompileSdk=35
# R8 full mode has known regressions with Compose's LocalLifecycleOwner wiring in release
# builds (crashes with "CompositionLocal LocalLifecycleOwner not present" on launch).
# Compat mode avoids the whole class of bug at negligible size/perf cost for this app.
android.enableR8.fullMode=false
